<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tic Tac Toe</title>
</head>
<body>
    <div class="outerContainer">
        <div id="leftSideBar">
            <div class="signIn">
                <div>Sign-In</div>
                <div>Email</div>
                <div>.....</div>
            </div>
            <div class="sideIcon"></div>
        </div>
        <div id="mainContent">
            <div id="desktopUI">
                <div class="nav1">
                    <div class="design1">
                        <div class="tabIcon">Tic Tac Toe</div>
                        <div class="addTab"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>plus</title><path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" /></svg></div>
                    </div>
                    <div class="design2">
                        <span class="minimizeBtn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>minus</title><path fill="currentColor"d="M19,13H5V11H19V13Z" /></svg></span>
                        <span class="screenSizeBtn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>content-copy</title><path fill="currentColor" d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z" /></svg></span>
                        <span class="exitBtn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>window-close</title><path fill="currentColor" d="M13.46,12L19,17.54V19H17.54L12,13.46L6.46,19H5V17.54L10.54,12L5,6.46V5H6.46L12,10.54L17.54,5H19V6.46L13.46,12Z" /></svg>
                    </div>
                </div>
                <div class="nav2">
                    <span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>arrow-left</title><path fill="currentColor" d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" /></svg></span>
                    <span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>arrow-right</title><path fill="currentColor" d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z" /></svg></span>
                    <span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>reload</title><path fill="currentColor" d="M2 12C2 16.97 6.03 21 11 21C13.39 21 15.68 20.06 17.4 18.4L15.9 16.9C14.63 18.25 12.86 19 11 19C4.76 19 1.64 11.46 6.05 7.05C10.46 2.64 18 5.77 18 12H15L19 16H19.1L23 12H20C20 7.03 15.97 3 11 3C6.03 3 2 7.03 2 12Z" /></svg></span>
                    <span>https://tic-tac-toe</span>
                    <span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>fruit-cherries</title><path fill="currentColor" d="M16 13H15.5C14.8 11.7 14.3 10 13.8 8.3L14.7 9.2C17.4 11.3 19.8 10.9 19.8 10.9S20.5 7.1 17.8 5.1C15.5 3.3 13.4 3.3 12.8 3.4C12.7 2.8 12.7 2.3 12.6 1.9L11.2 2C11.2 5.2 8.5 11.1 7.6 13C5.6 13.2 4 14.9 4 17C4 19.2 5.8 21 8 21C9.1 21 10 20.6 10.7 19.9C10.3 19 10 18 10 17S10.3 15 10.7 14.1C10.3 13.7 9.7 13.4 9.2 13.2C9.9 11.7 11.1 9 11.9 6.4C12.3 8.7 13.1 11.4 14.1 13.5C12.9 14.2 12 15.5 12 17C12 19.2 13.8 21 16 21S20 19.2 20 17 18.2 13 16 13M8 15.5C7.2 15.5 6.5 16.2 6.5 17H5.5C5.5 15.6 6.6 14.5 8 14.5V15.5M16 15.5C15.2 15.5 14.5 16.2 14.5 17H13.5C13.5 15.6 14.6 14.5 16 14.5V15.5Z" /></svg></span>
                </div>
                <div id="gamePlayContainer">
                    <div id="gridContainer">
                        <div class="turnContainer">
                            <span class="turnText highlight">Player 1's Turn</span>
                            <span class="turnText">Player 2's turn</span>
                        </div>
                        <div id="gameGrid">
                            <div class="winningLine"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="rightSideBar">
            <div class="sideIcon"></div>
            <div class="fakeError">
                <div>Error</div>
                <div> ERROR ERROR!</div>
            </div>
        </div>
    </div>
    <div class="secondContainer hideDisplay">
        <div class="header">Hello world</div>
        <div class="selectionContainer">
            <div class="playerBox">
                <img class="iconImg" src="heart.png"></img>
                <div class="playerTxt">Player 1</div>
            </div>
            <div class="vsText">VS</div>
            <div class="playerBox">
                <img id="player2Img"class="iconImg" src="star.png"></img>
                <div class="playerTxt">Player 2</div>
            </div>
            <div class="choiceContainer">
                <div>Player 2:</div>
                <div class="circleContainer">
                    <div class="choiceCircle highlight">Player</div>
                    <div class="choiceCircle">Bot</div>
                </div>
            </div>
        </div>
        <button class="startBtn">Start Game</button>
    </div>






    <script src="index.js"></script>
</body>
</html>
